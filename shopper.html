<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Join as a Shopper | HoaK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #0b0d12;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #121520;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.6s ease;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #9aa0b4;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: none;
      background: #1b2030;
      color: white;
      font-size: 16px;
    }

    input:focus {
      outline: 2px solid #7b2ff7;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg,#7b2ff7,#00c6ff);
      transition: 0.3s ease;
    }

    button:hover {
      opacity: 0.9;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .success {
      display: none;
      margin-top: 20px;
      color: #00c6ff;
      font-weight: 500;
      text-align: center;
    }

    .error {
      display: none;
      margin-top: 20px;
      color: #ff4d4d;
      text-align: center;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Join HoaK as a Shopper</h1>
    <p>Be the first to experience personalised shopping.</p>

    <form id="shopperForm">
      <input id="name" type="text" placeholder="Full Name" required />
      <input id="mobile" type="tel" placeholder="Mobile Number" required />
      <input id="city" type="text" placeholder="City" required />
      <button id="submitBtn" type="submit">Join Now</button>
    </form>

    <div class="success" id="successMsg">
      🎉 Thanks! We saved your information.
    </div>

    <div class="error" id="errorMsg">
      Something went wrong. Please try again.
    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const form = document.getElementById("shopperForm");
  const successMsg = document.getElementById("successMsg");
  const errorMsg = document.getElementById("errorMsg");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";

    const data = {
      name: document.getElementById("name").value.trim(),
      mobile: document.getElementById("mobile").value.trim(),
      city: document.getElementById("city").value.trim()
    };

    fetch("https://script.google.com/macros/s/AKfycbwGra3-NQgbwOV_XCVb8qtp66GgSWb0iGSUsDOQ1h5X9qWH0RFJz15YWifS2LPsZEg/exec", {
      method: "POST",
      body: JSON.stringify(data),
      headers: {
        "Content-Type": "application/json"
      }
    })
    .then(response => response.json())
    .then(result => {
      if (result.status === "success") {
        form.reset();
        successMsg.style.display = "block";
        errorMsg.style.display = "none";
      } else {
        throw new Error("Script error");
      }
    })
    .catch(error => {
      console.error(error);
      errorMsg.style.display = "block";
      successMsg.style.display = "none";
    })
    .finally(() => {
      submitBtn.disabled = false;
      submitBtn.textContent = "Join Now";
    });

  });

});
</script>

</body>
</html>
