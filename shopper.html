<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Join as a Shopper | HoaK</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #0b0d12;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: #121520;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    p {
      color: #9aa0b4;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 16px;
      border-radius: 10px;
      border: none;
      background: #1b2030;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg,#7b2ff7,#00c6ff);
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Join HoaK as a Shopper</h1>
    <p>Be the first to experience personalised shopping.</p>

    <!-- Hidden iframe -->
    <iframe name="hidden_iframe" style="display:none;"></iframe>

    <form 
      action="https://script.googleusercontent.com/macros/echo?user_content_key=AehSKLjqojtrBsN3QE8IGk9w2jLElklWXWDZ-F-9PhCWDOXJH8la1KZbG5jYFyxRLsxbVPI8kkwGrhWN15hbMqZYrBH241MgorHpE51-j9rHv4gUbRB8yChFEZ2XA_JB_6yrRu6RqQat4-EA4GacXpi1NFQem3s0xRm73E61VQ0IuY-qDAa9BokAvbwpR4JWyMzzwuAwF-nhVtLSGVgg0ESlllRpQA8_g1JvXhAQ8vISRwA1qnxwlL_fs_8z_Nsv3yiWssCkJbb_trZ5iciNwjjgDIwrZd7HiA&lib=MmrfacZGZ8Wby8Oy-8UoaIrUz7p6ufxs_"
      method="POST"
      target="hidden_iframe"
      onsubmit="handleSubmit()">

      <input name="name" type="text" placeholder="Full Name" required />
      <input name="mobile" type="tel" placeholder="Mobile Number" required />
      <input name="city" type="text" placeholder="City" required />
      <button id="submitBtn" type="submit">Join Now</button>
    </form>

    <div id="successMsg" style="display:none; margin-top:20px; color:#00c6ff;">
      🎉 Thank you! Your details have been saved.
    </div>
  </div>

<script>
function handleSubmit() {
  document.getElementById("submitBtn").innerText = "Submitting...";
  document.getElementById("submitBtn").disabled = true;

  setTimeout(function() {
    document.getElementById("successMsg").style.display = "block";
    document.getElementById("submitBtn").style.display = "none";
  }, 1000);
}
</script>
</body>

</html>
